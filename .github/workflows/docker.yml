# /.github/workflows/docker.yml
# Baut ghcr.io/pavl21/nginx-ptero für PHP 8.1, 8.2, 8.3, 8.4
# Trigger: Push auf main ODER manuell über "Run workflow"

name: Build & Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pavl21/nginx-ptero

jobs:
  build:
    name: PHP ${{ matrix.php_ver }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - php_ver: "8.1"
            php_pkg: "php81"
            alpine:  "3.18"
            tag:     "8.1"
          - php_ver: "8.2"
            php_pkg: "php82"
            alpine:  "3.19"
            tag:     "8.2"
          - php_ver: "8.3"
            php_pkg: "php83"
            alpine:  "3.20"
            tag:     "8.3"
          - php_ver: "8.4"
            php_pkg: "php84"
            alpine:  "3.21"
            tag:     "8.4"

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Image-Metadaten ermitteln
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.tag }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALPINE_VERSION=${{ matrix.alpine }}
            PHP_PKG=${{ matrix.php_pkg }}
            PHP_VER=${{ matrix.php_ver }}
          cache-from: type=gha,scope=php-${{ matrix.php_ver }}
          cache-to:   type=gha,scope=php-${{ matrix.php_ver }},mode=max
